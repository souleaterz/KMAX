name: Android Debug APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build KMAX Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Write provider config
        run: node scripts/write-ci-provider.mjs
        env:
          KMAX_STREMIO_BASE_URL: ${{ secrets.KMAX_STREMIO_BASE_URL }}

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build
        env:
          VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
          VITE_REAL_DEBRID_API_KEY: ${{ secrets.VITE_REAL_DEBRID_API_KEY }}
          VITE_KMAX_PROVIDER_CONFIG: /providers.local.json

      - name: Sync Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kmax-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: KMAX ${{ github.ref_name }}
          body: |
            KMAX Android TV / Firestick debug APK.

            This build includes the native Firestick playback bridge, Torrentio/Stremio provider support, and optional Real-Debrid resolving for private builds.
          files: android/app/build/outputs/apk/debug/*.apk
